<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Báo Cáo Task - Đội Nhóm</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;       /* slate-900 */
      --card-bg: #1e293b;       /* slate-800 */
      --border-color: #334155;  /* slate-700 */
      --text-main: #f8fafc;     /* slate-50 */
      --text-muted: #94a3b8;    /* slate-400 */
      --accent: #3b82f6;        /* blue-500 */
      --accent-hover: #2563eb;  /* blue-600 */
      --color-success: #10b981; /* emerald-500 */
      --color-danger: #ef4444;  /* red-500 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .form-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .header-section {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .header-section h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header-section p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-dark);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-control:focus {
      border-color: var(--accent);
    }

    select.form-control {
      cursor: pointer;
    }
    
    select.form-control option {
      background-color: var(--card-bg);
      color: var(--text-main);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 100px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .col {
      flex: 1;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8);
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
    }

    .btn-submit.loading {
      opacity: 0.7;
      cursor: not-allowed;
      pointer-events: none;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }
    .alert.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--color-success);
      display: block;
    }
    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--color-danger);
      display: block;
    }

    .view-container {
      display: none;
      width: 100%;
      max-width: 600px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .user-info-badge {
      display: inline-block;
      padding: 8px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      color: var(--text-main);
    }

    .logout-btn {
      color: var(--color-danger);
      text-decoration: none;
      cursor: pointer;
      margin-left: 15px;
      font-weight: 600;
    }
    .logout-btn:hover {
      text-decoration: underline;
    }

    .readonly-input {
      background: rgba(255,255,255,0.05) !important;
      color: var(--text-muted) !important;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      .row { flex-direction: column; gap: 0; }
      .form-container { padding: 25px 20px; }
    }
  </style>
</head>
<body>

  <!-- VIEW: ĐĂNG NHẬP -->
  <div id="loginView" class="view-container form-container">
    <div class="header-section">
      <h2>Đăng Nhập Hệ Thống 🔒</h2>
      <p>Vui lòng đăng nhập để bắt đầu báo cáo task</p>
    </div>
    
    <div id="loginAlertBox" class="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
      </div>
      <button type="submit" id="btnLogin" class="btn-submit">Đăng Nhập Đi Vào ➜</button>
    </form>
  </div>

  <!-- VIEW: BÁO CÁO TASK -->
  <div id="reportView" class="view-container form-container">
    <div class="header-section">
      <h2>Báo Cáo Task 🔥</h2>
      <p>Hệ thống tự động đồng bộ hóa lên Sheet quản lý.</p>
    </div>

    <div style="text-align: center;">
      <div class="user-info-badge">
        👤 Xin chào: <span id="displayUserName" style="font-weight: 700; color: #fff;">...</span>
        <div style="display: inline-block; margin-left: 15px;">
          <a class="logout-btn" onclick="goToDashboard()" style="background: var(--accent); color: #fff; border: none; margin-right: 5px; cursor: pointer;">← Về Admin</a>
          <a class="logout-btn" onclick="handleLogout()" style="cursor: pointer;">Đăng xuất</a>
        </div>
      </div>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="taskForm" onsubmit="handleFormSubmit(event)">
      <div class="row">
        <div class="form-group col">
          <label>Thành viên thực hiện</label>
          <input type="text" name="member_name" id="member_name_input" class="form-control readonly-input" readonly required>
        </div>

        <div class="form-group col">
          <label>Ban phụ trách (Nhóm)</label>
          <select name="department" class="form-control" required>
            <option value="" disabled selected>— Chọn Ban —</option>
            <option value="Đội Nội">Đội Nội</option>
            <option value="Văn Hóa - Giáo Dục">Văn Hóa - Giáo Dục</option>
            <option value="Tài Chính">Tài Chính</option>
            <option value="IT (Kỹ Thuật)">IT (Kỹ Thuật)</option>
            <option value="Truyền Thông">Truyền Thông</option>
            <option value="Sự Kiện">Sự Kiện</option>
            <option value="Hậu Cần">Hậu Cần</option>
            <option value="Nhân Sự">Nhân Sự</option>
            <option value="R&D">Nghiên Cứu & Phát Triển (R&D)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Tên Công Việc (Task)</label>
        <input type="text" name="task_name" id="task_name_input" class="form-control" placeholder="Ví dụ: Thiết kế banner sự kiện khai giảng" required>
      </div>

      <div class="form-group">
        <label>Chi tiết công việc / Khó khăn (Nếu có)</label>
        <textarea name="task_desc" id="task_desc_input" class="form-control" placeholder="Mô tả kỹ hơn những gì đang làm, hay những vướng mắc cần leader support..."></textarea>
      </div>

      <div class="row">
        <div class="form-group col">
          <label>Trạng thái</label>
          <select name="status" id="status_input" class="form-control" required>
            <option value="Mới bắt đầu">Mới bắt đầu</option>
            <option value="Đang tiến hành">Đang tiến hành</option>
            <option value="Bị nghẽn (Cần hỗ trợ)">Bị nghẽn (Cần hỗ trợ)</option>
            <option value="Đã hoàn thành">Đã hoàn thành ✅</option>
          </select>
        </div>

        <div class="form-group col">
          <label>Mức độ ưu tiên</label>
          <select name="priority" id="priority_input" class="form-control" required>
            <option value="Sắp xếp sau (Thấp)">Sắp xếp sau (Thấp)</option>
            <option value="Bình thường" selected>Bình thường</option>
            <option value="Gấp gọn (Cao) 🚨">Gấp gọn (Cao) 🚨</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Deadline dự kiến</label>
        <input type="date" name="deadline" id="deadline_input" class="form-control">
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">
        Gửi Báo Cáo Task Tham Gia 🚀
      </button>
    </form>
  </div>

  <!-- POPUP: ĐĂNG KÝ CONTACT ID -->
  <div id="contactModal" class="modal-overlay">
    <div class="modal-content">
      <h3 style="margin-bottom: 10px; color: #fff;">Cập Nhật Thông Tin 🔔</h3>
      <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 25px;">
        Vui lòng cung cấp Discord ID và Gmail của bạn để hệ thống cập nhật tiến độ công việc.
      </p>
      
      <div id="modalAlert" class="alert"></div>

      <div class="form-group" style="text-align: left;">
        <label>Discord ID</label>
        <input type="text" id="discordInput" class="form-control" placeholder="Nhập Discord ID..." required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label>Gmail</label>
        <input type="email" id="gmailInput" class="form-control" placeholder="Nhập Gmail..." required>
      </div>
      
      <button onclick="saveContact()" id="btnSaveContact" class="btn-submit">Lưu Thông Tin</button>
      <button onclick="closeModal()" class="btn-submit" style="background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-muted); margin-top: 10px;">Bỏ qua lúc này</button>
    </div>
  </div>

  <script>
    // MỤC CẤU HÌNH CHO GITHUB PAGES
    // Điền Link Apps Script "Web App" của bạn vào đây (Link kết thúc bằng /exec)
    const APP_SCRIPT_URL = ""; 

    // --- KHỞI TẠO VÀ KIỂM TRA SESSION ---
    let currentUser = null;

    window.onload = () => {
      const savedSession = localStorage.getItem('task_app_user');
      if (savedSession) {
        try {
          currentUser = JSON.parse(savedSession);
          showReportView();
        } catch(e) {
          showLoginView();
        }
      } else {
        showLoginView();
      }
    };

    function showLoginView() {
      document.getElementById('loginView').style.display = 'block';
      document.getElementById('reportView').style.display = 'none';
      document.getElementById('contactModal').style.display = 'none';
    }

    function showReportView() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('reportView').style.display = 'block';
      
      // Khóa cứng tên hiển thị + Field ẩn
      document.getElementById('displayUserName').innerText = currentUser.name;
      document.getElementById('member_name_input').value = currentUser.name;

      // Kiểm tra xem user này đã nhập Discord ID và Gmail chưa, nếu chưa bắt nhập
      if (!currentUser.discord_id || currentUser.discord_id.trim() === '' || !currentUser.gmail || currentUser.gmail.trim() === '') {
        setTimeout(() => {
          document.getElementById('contactModal').style.display = 'flex';
        }, 1000);
      }
    }

    // --- HÀM GỌI API CHUNG TƯƠNG THÍCH ĐA MÔI TRƯỜNG ---
    function callBackendAPI(action, dataObj, onSuccess, onError) {
      // Môi trường Apps Script Native
      if (typeof google !== 'undefined' && google.script && APP_SCRIPT_URL === "") {
        if (action === "loginUser") {
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onError)
            .loginUser(dataObj.username, dataObj.password);
        } else if (action === "updateUserInfo") {
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onError)
            .updateUserInfo(dataObj.username, dataObj.discord, dataObj.gmail);
        } else if (action === "submitTask") {
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onError)
            .submitTask(dataObj);
        }
      } 
      // Môi trường GitHub Pages / External host
      else if (APP_SCRIPT_URL !== "") {
        fetch(APP_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: action, data: dataObj })
        })
        .then(res => res.json())
        .then(data => onSuccess(data))
        .catch(err => onError(err));
      } 
      // Môi trường Test (Mock)
      else {
        setTimeout(() => {
          if (action === "loginUser") {
            onSuccess({ success: true, data: { username: dataObj.username, name: 'Tài khoản Test', discord_id: '', gmail: '' } });
          } else {
            onSuccess({ success: true, message: "Thành công (Mock)" });
          }
        }, 800);
      }
    }

    // --- HÀM XỬ LÝ ĐĂNG NHẬP ---
    function handleLogin(event) {
      event.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const box = document.getElementById('loginAlertBox');

      btn.classList.add('loading');
      btn.innerText = "Đang kiểm tra...";
      box.style.display = 'none';

      callBackendAPI("loginUser", { username: u, password: p }, 
        (res) => {
          btn.classList.remove('loading');
          btn.innerText = "Đăng Nhập Đi Vào ➜";
          if (res.success) {
            currentUser = res.data;
            localStorage.setItem('task_app_user', JSON.stringify(currentUser));
            showReportView();
          } else {
            box.className = "alert error";
            box.innerText = res.message;
            box.style.display = 'block';
          }
        }, 
        (err) => {
          btn.classList.remove('loading');
          btn.innerText = "Đăng Nhập Đi Vào ➜";
          box.className = "alert error";
          box.innerText = "Lỗi kết nối: " + err;
          box.style.display = 'block';
        }
      );
    }

    function handleLogout() {
      localStorage.removeItem('task_app_user');
      currentUser = null;
      document.getElementById('loginForm').reset();
      showLoginView();
    }

    // --- HÀM XỬ LÝ LƯU THÔNG BÁO ---
    function closeModal() {
      document.getElementById('contactModal').style.display = 'none';
    }

    function saveContact() {
      const discord = document.getElementById('discordInput').value;
      const gmail = document.getElementById('gmailInput').value;
      const btn = document.getElementById('btnSaveContact');
      const alertBox = document.getElementById('modalAlert');

      if(!discord.trim() || !gmail.trim()) {
        alertBox.className = "alert error";
        alertBox.innerText = "Vui lòng nhập đầy đủ thông tin!";
        return;
      }

      btn.classList.add('loading');
      btn.innerText = "Đang lưu...";

      callBackendAPI("updateUserInfo", { username: currentUser.username, discord: discord, gmail: gmail },
        (res) => {
          btn.classList.remove('loading');
          btn.innerText = "Lưu Thông Tin";
          if(res.success) {
            currentUser.discord_id = discord;
            currentUser.gmail = gmail;
            localStorage.setItem('task_app_user', JSON.stringify(currentUser));
            alertBox.className = "alert success";
            alertBox.innerText = "Đã lưu thành công!";
            setTimeout(() => closeModal(), 1500);
          } else {
            alertBox.className = "alert error";
            alertBox.innerText = res.message;
          }
        },
        (err) => {
          btn.classList.remove('loading');
          btn.innerText = "Thử lại";
          alertBox.className = "alert error";
          alertBox.innerText = "Lỗi kết nối: " + err;
        }
      );
    }

    // --- HÀM XỬ LÝ SUBMIT REPORT ---
    function handleFormSubmit(event) {
      event.preventDefault(); 
      
      const form = document.getElementById("taskForm");
      const btn = document.getElementById("submitBtn");
      const alertBox = document.getElementById("alertBox");
      
      btn.innerText = "Đang gửi dữ liệu...";
      btn.classList.add("loading");
      alertBox.className = "alert";
      alertBox.innerText = "";
      alertBox.style.display = 'none';
 
      const formData = new FormData(form);
      const dataObj = {};
      formData.forEach((value, key) => (dataObj[key] = value));

      // Bổ sung thông tin người dùng vào dataObj
      dataObj.mnv = currentUser.mnv || '';
      dataObj.discord_id = currentUser.discord_id || '';
      dataObj.gmail = currentUser.gmail || '';

      callBackendAPI("submitTask", dataObj,
        (res) => {
          btn.classList.remove("loading");
          btn.innerText = "Gửi Báo Cáo Task Tham Gia 🚀";
          if(res.success) {
            alertBox.className = "alert success";
            alertBox.innerHTML = `🎉 Cập nhật thành công! Task đã lên Google Sheet.<br><br>
                <button onclick="goToDashboard()" style="padding:8px 16px; border:none; background:var(--bg-dark); color:#fff; border-radius:6px; cursor:pointer;" onmouseover="this.style.background='var(--border-color)'" onmouseout="this.style.background='var(--bg-dark)'">Quay về trang Quản Trị 👉</button>`;
            alertBox.style.display = 'block';
            
            document.getElementById('task_name_input').value = "";
            document.getElementById('task_desc_input').value = "";
            document.getElementById('deadline_input').value = "";
            
            // Xóa đoạn setTimeout ẩn alert đi để nút về Dashboard luôn hiện
          } else {
            alertBox.className = "alert error";
            alertBox.innerText = "❌ Lỗi: " + res.message;
            alertBox.style.display = 'block';
          }
        },
        (err) => {
          btn.classList.remove("loading");
          btn.innerText = "Thử Lại";
          alertBox.className = "alert error";
          alertBox.innerText = "❌ Lỗi mạng: " + err;
          alertBox.style.display = 'block';
        }
      );
    }
    
    // --- HÀM ĐIỀU HƯỚNG VỀ DASHBOARD ---
    function goToDashboard() {
      if (typeof google !== 'undefined' && google.script && APP_SCRIPT_URL === "") {
        google.script.run.withSuccessHandler(function(url) {
          window.location.href = url + '?page=dashboard';
        }).getScriptUrl();
      } else if (APP_SCRIPT_URL !== "") {
        window.location.href = "dashboard.html";
      } else {
        window.location.href = "dashboard.html";
      }
    }
  </script>
</body>
</html>
