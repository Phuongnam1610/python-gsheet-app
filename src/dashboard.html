<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Thống Kê - Task Nhóm</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --glass-bg: rgba(25, 25, 35, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.7);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      color: var(--text-main);
      padding: 30px;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
      animation: fadeInDown 0.8s ease-out;
    }
    
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .btn-report {
      padding: 10px 20px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.5);
      color: #e0e7ff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    .btn-report:hover {
      background: rgba(99, 102, 241, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeInUp 0.8s ease-out backwards;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }
    
    .stat-title {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
    
    .chart-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      height: 350px;
      animation: fadeInUp 0.8s ease-out backwards;
      animation-delay: 0.5s;
    }

    .chart-container h3 {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .table-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      overflow-x: auto;
      animation: fadeInUp 0.8s ease-out backwards;
      animation-delay: 0.6s;
    }
    
    .table-container h3 {
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--text-main);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    th {
      padding: 12px 15px;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 1px solid var(--glass-border);
    }
    
    td {
      padding: 15px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    tbody tr {
      transition: background 0.3s ease;
    }
    
    tbody tr:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-badge.hoan-thanh { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .status-badge.dang-tien-hanh { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .status-badge.bi-nghen { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .status-badge.moi-bat-dau { background: rgba(167, 139, 250, 0.2); color: #c084fc; }
    
    #loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <h3>Đang tải dữ liệu báo cáo...</h3>
  </div>

  <div class="dashboard-container" style="display: none;" id="mainContent">
    <div class="header">
      <div>
        <h1>Dashboard Thống Kê</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Cập nhật tình hình ban/nhóm thời gian thực</p>
      </div>
      <!-- Link về trang gốc báo cáo. Gợi ý: URL có thể bỏ parameter page đi -->
      <a href="?page=report" id="btnReportLink" class="btn-report">← Về trang Báo cáo</a>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">Tổng số Task</div>
        <div class="stat-value" style="color: #60a5fa;" id="valTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Đã Hoàn Thành</div>
        <div class="stat-value" style="color: #34d399;" id="valCompleted">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Tỷ Lệ Hoàn Thành</div>
        <div class="stat-value" style="color: #c084fc;" id="valRate">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Trung bình Task/Ngày</div>
        <div class="stat-value" style="color: #fbbf24;" id="valAvg">0</div>
      </div>
    </div>
    
    <div class="charts-grid">
      <div class="chart-container">
        <h3>Trạng Thái Task</h3>
        <canvas id="statusChart"></canvas>
      </div>
      <div class="chart-container">
        <h3>Task Theo Ban</h3>
        <canvas id="deptChart"></canvas>
      </div>
    </div>
    
    <div class="table-container">
      <h3>🚀 Các Task Gần Đây</h3>
      <table id="recentTasksTable">
        <thead>
          <tr>
            <th>Thời gian</th>
            <th>Nhân sự</th>
            <th>Ban</th>
            <th>Tên Task</th>
            <th>Trạng thái</th>
            <th>Mức ưu tiên</th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Tuỳ chỉnh Chart.js màu sắc mặc định cho Dark Theme
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = "'Outfit', sans-serif";

    function updateDashboard(data) {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
      }, 500);

      // Đẩy data vào text cards
      document.getElementById('valTotal').innerText = data.total;
      document.getElementById('valCompleted').innerText = data.completedCount;
      document.getElementById('valRate').innerText = data.completionRate + '%';
      document.getElementById('valAvg').innerText = data.avgTasksPerDay;

      // Render Charts
      renderStatusChart(data.byStatus);
      renderDeptChart(data.byDepartment);
      
      // Render Table
      renderTable(data.recentTasks);
    }

    function renderStatusChart(byStatus) {
      const labels = Object.keys(byStatus);
      const values = Object.values(byStatus);
      
      const ctx = document.getElementById('statusChart').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: [
              'rgba(16, 185, 129, 0.8)', // Xanh hoàn thành
              'rgba(59, 130, 246, 0.8)', // Xanh dương đang làm
              'rgba(239, 68, 68, 0.8)',  // Đỏ bị nghẽn
              'rgba(167, 139, 250, 0.8)',// Tím mới bắt đầu
              'rgba(245, 158, 11, 0.8)'  // Cam khác
            ],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { padding: 20, color: '#e2e8f0'} },
          },
          cutout: '70%'
        }
      });
    }

    function renderDeptChart(byDept) {
      const labels = Object.keys(byDept);
      const values = Object.values(byDept);
      
      const ctx = document.getElementById('deptChart').getContext('2d');
      
      // Tạo gradient cho bar chart
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(99, 102, 241, 0.8)');
      gradient.addColorStop(1, 'rgba(168, 85, 247, 0.8)');

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Số lượng Task',
            data: values,
            backgroundColor: gradient,
            borderRadius: 6,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { precision: 0 }
            },
            x: {
              grid: { display: false }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function renderTable(tasks) {
      const tbody = document.querySelector('#recentTasksTable tbody');
      tbody.innerHTML = '';
      
      if(tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Chưa có dữ liệu</td></tr>';
        return;
      }

      tasks.forEach(task => {
        const tr = document.createElement('tr');
        
        let badgeClass = 'moi-bat-dau';
        let s = task.status.toLowerCase();
        if(s.includes('hoàn thành')) badgeClass = 'hoan-thanh';
        else if(s.includes('đang')) badgeClass = 'dang-tien-hanh';
        else if(s.includes('nghẽn') || s.includes('hỗ trợ')) badgeClass = 'bi-nghen';

        tr.innerHTML = `
          <td style="color: #94a3b8;">${task.timestamp}</td>
          <td style="font-weight: 500;">${task.member_name}</td>
          <td>${task.department}</td>
          <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${task.task_name}">${task.task_name}</td>
          <td><span class="status-badge ${badgeClass}">${task.status}</span></td>
          <td>${task.priority.includes('Cao') ? '🚨 ' + task.priority : task.priority}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // MỤC CẤU HÌNH CHO GITHUB PAGES
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz82I5oG4o1N25QX6hpIvLXVqMK3xVypYLnynWaba_58eB3OgdMywoeBk8aGaIWboBP_Q/exec"; 

    window.onload = () => {
      // 1. Gắn link cho nút Back
      if (typeof google !== 'undefined' && google.script && APP_SCRIPT_URL === "") {
        google.script.run.withSuccessHandler(function(url) {
          document.getElementById('btnReportLink').href = url + '?page=report';
        }).getScriptUrl();
      } else if (APP_SCRIPT_URL !== "") {
        document.getElementById('btnReportLink').href = "index.html"; 
      }

      // 2. Fetch Data Dashboard
      if (typeof google !== 'undefined' && google.script && APP_SCRIPT_URL === "") {
        google.script.run
          .withSuccessHandler(function(response) {
            if(response.success) {
               updateDashboard(response.data);
            } else {
               alert("Lỗi tải data: " + response.message);
            }
          })
          .withFailureHandler(function(err) {
            alert("Lỗi kết nối: " + err.message);
          })
          .getDashboardData();
      } else if (APP_SCRIPT_URL !== "") {
        // External JSON API fetch
        fetch(APP_SCRIPT_URL + "?action=getDashboardData")
          .then(res => res.json())
          .then(response => {
             if(response.success) updateDashboard(response.data);
             else alert("Lỗi tải data: " + response.message);
          })
          .catch(err => alert("Lỗi kết nối: " + err));
      } else {
        // Mock data nếu chạy local (để test UI)
        setTimeout(() => {
          updateDashboard({
            total: 120, completedCount: 85, completionRate: 71, avgTasksPerDay: 5.2,
            byStatus: {'Đã hoàn thành ✅': 85, 'Đang tiến hành': 20, 'Bị nghẽn (Cần hỗ trợ)': 5, 'Mới bắt đầu': 10},
            byDepartment: {'IT (Kỹ Thuật)': 30, 'Truyền Thông': 25, 'Sự Kiện': 40, 'Nhân Sự': 25},
            recentTasks: [
              { timestamp: '14/04/2026 12:30', member_name: 'Nguyễn Văn A', department: 'IT (Kỹ Thuật)', task_name: 'Code module login', status: 'Đã hoàn thành ✅', priority: 'Gấp gọn (Cao) 🚨' },
              { timestamp: '14/04/2026 10:15', member_name: 'Trần Thị B', department: 'Sự Kiện', task_name: 'Khảo sát địa điểm', status: 'Đang tiến hành', priority: 'Bình thường' }
            ]
          });
        }, 1500);
      }
    };
  </script>
</body>
</html>
